<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Калькулятор{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Навигация */
        nav {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        nav .brand {
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
        }
        nav .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        nav .nav-links a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        nav .nav-links a:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        nav .nav-links .user-badge {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        /* Flash-сообщения */
        .messages {
            max-width: 500px;
            margin: 15px auto 0;
            padding: 0 20px;
        }
        .msg {
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .msg.success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .msg.info    { background: #dbeafe; color: #1d4ed8; border: 1px solid #bfdbfe; }

        .content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 420px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.6rem;
        }
        h2 {
            color: #444;
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        /* Формы */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .form-input {
            width: 100%;
            padding: 11px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .field-errors {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 4px;
        }
        .field-errors li {
            list-style: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .btn-danger:hover {
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.4);
        }
        .btn-sm {
            width: auto;
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .result-box {
            margin-top: 22px;
            padding: 18px;
            background: #f0fdf4;
            border-radius: 8px;
            text-align: center;
        }
        .result-box .value {
            font-size: 2rem;
            font-weight: 700;
            color: #16a34a;
        }
        .error-box {
            margin-top: 22px;
            padding: 14px;
            background: #fef2f2;
            border-radius: 8px;
            text-align: center;
            color: #dc2626;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Таблица истории */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .history-table th,
        .history-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }
        .history-table th {
            color: #888;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .history-table .expr { color: #444; }
        .history-table .res { color: #16a34a; font-weight: 600; }
        .history-table .err { color: #dc2626; }
        .history-table .date-cell { color: #999; white-space: nowrap; }

        /* Статистика */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: linear-gradient(135deg, #f8faff, #f0f4ff);
            border: 1px solid #e0e7ff;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat-box .stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: #667eea;
        }
        .stat-box .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
        }

        .link {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover { text-decoration: underline; }
        .center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        .empty { color: #999; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<nav>
    <a href="{% url 'calculator:index' %}" class="brand">🧮 CalcApp</a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'calculator:index' %}">Калькулятор</a>
            <span class="user-badge">👤 {{ user.username }}</span>
            <a href="{% url 'calculator:profile' %}">Профиль</a>
            <a href="{% url 'calculator:logout' %}">Выйти</a>
        {% else %}
            <a href="{% url 'calculator:login' %}">Войти</a>
            <a href="{% url 'calculator:register' %}">Регистрация</a>
        {% endif %}
    </div>
</nav>

{% if messages %}
<div class="messages">
    {% for msg in messages %}
        <div class="msg {{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
</div>
{% endif %}

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
