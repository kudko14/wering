{% extends "calculator/base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="card">
    <h1>🔐 Вход</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Введите логин" required>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Введите пароль" required>
        </div>

        <button class="btn" type="submit">Войти</button>
    </form>

    <p class="center mt-20">
        Нет аккаунта? <a href="{% url 'calculator:register' %}" class="link">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
